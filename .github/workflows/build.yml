name: Build Windows

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: x86_64-pc-windows-msvc

      - name: Download ffmpeg.exe
        shell: pwsh
        run: |
          $url = "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip"
          $extractDir = "$env:TEMP\ffmpeg_extract"
          $zip = "$env:TEMP\ffmpeg.zip"
          Write-Host "Downloading ffmpeg from $url ..."
          curl.exe -sL "$url" -o "$zip"
          Write-Host "Extracting ffmpeg.exe ..."
          New-Item -ItemType Directory -Force -Path $extractDir | Out-Null
          7z x "$zip" -o"$extractDir" -y | Out-Null
          $exe = Get-ChildItem -Path $extractDir -Recurse -Filter "ffmpeg.exe" | Select-Object -First 1
          if (-not $exe) { throw "ffmpeg.exe not found in extracted files" }
          New-Item -ItemType Directory -Force -Path src-tauri/resources | Out-Null
          Copy-Item $exe.FullName src-tauri/resources\ffmpeg.exe -Force
          Write-Host "ffmpeg.exe ready at src-tauri/resources/ffmpeg.exe"

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri app
        run: npm run tauri build -- --bundles msi

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v6
        with:
          name: FFwrap-Windows-MSI
          path: src-tauri/target/release/bundle/msi/*.msi

      - name: Upload NSIS artifact
        uses: actions/upload-artifact@v6
        with:
          name: FFwrap-Windows-EXE
          path: src-tauri/target/release/bundle/nsis/*.exe

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"
          $msi = Get-Item src-tauri/target/release/bundle/msi/*.msi
          $exe = Get-Item src-tauri/target/release/bundle/nsis/*.exe
          $notes = "FFwrap $tag`n`nSee the [changelog](../../commits/$tag) for details."
          gh release create "$tag" --draft --title "FFwrap $tag" --notes "$notes" "$msi" "$exe"
